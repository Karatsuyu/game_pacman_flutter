name: pacman_game
description: "Pac-Man Neon Edition - Un juego clásico reinventado con estilo futurista neón"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Para efectos de vibración
  vibration: ^2.0.0
  # Guardar puntuaciones y configuraciones
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Assets de audio (generados programáticamente)
  assets:
    - assets/audio/
    
  # Fuentes personalizadas
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
